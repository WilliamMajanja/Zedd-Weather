apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: zedd-weather
  labels:
    app: open-webui
    app.kubernetes.io/part-of: zedd-weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      # Run on pinet-alpha (UI dashboard node with NVMe storage)
      nodeSelector:
        storage: nvme
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
          env:
            # pinet-sigma hosts Ollama on port 11434
            - name: OLLAMA_BASE_URL
              value: "http://10.0.0.20:11434"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: zedd-weather-secrets
                  key: WEBUI_SECRET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          persistentVolumeClaim:
            claimName: open-webui-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-pvc
  namespace: zedd-weather
  labels:
    app: open-webui
    app.kubernetes.io/part-of: zedd-weather
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: zedd-weather
  labels:
    app: open-webui
    app.kubernetes.io/part-of: zedd-weather
spec:
  selector:
    app: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: NodePort
