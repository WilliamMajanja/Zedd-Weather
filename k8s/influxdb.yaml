apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: zedd-weather
  labels:
    app: influxdb
    app.kubernetes.io/part-of: zedd-weather
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      # Run on pinet-alpha which has NVMe storage
      nodeSelector:
        storage: nvme
      securityContext:
        fsGroup: 1000
      containers:
        - name: influxdb
          image: influxdb:2.7-alpine
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: influxdb-config
            - secretRef:
                name: influxdb-credentials
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: zedd-weather
  labels:
    app: influxdb
    app.kubernetes.io/part-of: zedd-weather
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: zedd-weather
  labels:
    app: influxdb
    app.kubernetes.io/part-of: zedd-weather
spec:
  selector:
    app: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086
      protocol: TCP
  type: ClusterIP
