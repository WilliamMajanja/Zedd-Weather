name: Build & Push arm64 Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Zweather/**"
      - "Dockerfile"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Zweather/**"
      - "Dockerfile"
      - ".github/workflows/build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zedd-weather-edge

jobs:
  # ── Lint & type-check Python ──────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Zweather/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only the packages available on standard Linux (skip RPi-specific ones)
          pip install paho-mqtt influxdb-client python-dotenv google-genai aiohttp pymodbus pyserial smbus2
          pip install flake8 mypy

      - name: Flake8
        run: flake8 Zweather/ --select=E9,F63,F7,F82 --show-source --statistics

      - name: Mypy (app.py)
        run: mypy Zweather/app.py --ignore-missing-imports

  # ── Lint & type-check TypeScript frontend ────────────────────────────────
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run lint

  # ── Build multi-arch Docker image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push (arm64 + amd64)
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64,linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only authenticate on pushes to main (not on PRs from forks)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64,linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to K3s cluster (main branch only) ─────────────────────────────
  deploy:
    name: Deploy to PiNet K3s
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Apply secrets (skip if already exists to avoid overwriting)
        run: |
          kubectl apply -f k8s/secrets.yaml || echo "Secrets already exist – skipping to preserve values."

      - name: Deploy InfluxDB
        run: kubectl apply -f k8s/influxdb.yaml

      - name: Deploy Grafana
        run: kubectl apply -f k8s/grafana.yaml

      - name: Deploy Open WebUI
        run: kubectl apply -f k8s/open-webui.yaml

      - name: Deploy Zedd Weather Edge
        run: kubectl apply -f k8s/zedd-weather-edge-deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/zedd-weather-edge -n zedd-weather --timeout=120s
